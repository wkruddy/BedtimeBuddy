services:
  postgres:
    image: postgres:16-alpine
    container_name: bedtimebuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bedtimebuddy
      POSTGRES_PASSWORD: bedtimebuddy
      POSTGRES_DB: bedtimebuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bedtimebuddy -d bedtimebuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
